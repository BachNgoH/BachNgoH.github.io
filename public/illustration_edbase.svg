<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="300" fill="#f8fafc" fill-opacity="0.05"/>
  
  <!-- Stacked Documents -->
  <g transform="translate(100, 40)">
    <!-- Bottom Layer -->
    <rect x="0" y="20" width="160" height="200" rx="12" fill="#1d4ed8" fill-opacity="0.2" />
    
    <!-- Middle Layer -->
    <rect x="10" y="10" width="160" height="200" rx="12" fill="#1d4ed8" fill-opacity="0.4" />
    
    <!-- Top Layer -->
    <rect x="20" y="0" width="160" height="200" rx="12" fill="url(#grad1)" filter="url(#shadow)" />
    
    <!-- Content on Top Layer -->
    <g transform="translate(20, 0)">
      <rect x="20" y="30" width="120" height="12" rx="2" fill="white" fill-opacity="0.9" />
      <rect x="20" y="60" width="80" height="8" rx="2" fill="white" fill-opacity="0.7" />
      <rect x="20" y="80" width="120" height="8" rx="2" fill="white" fill-opacity="0.7" />
      <rect x="20" y="100" width="100" height="8" rx="2" fill="white" fill-opacity="0.7" />
      
      <!-- Sparkle -->
      <path d="M140 20 L145 30 L155 35 L145 40 L140 50 L135 40 L125 35 L135 30 Z" fill="#fbbf24" filter="url(#shadow)" />
    </g>
  </g>
</svg>
