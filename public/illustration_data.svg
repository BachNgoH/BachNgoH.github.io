<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2410c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#f8fafc" fill-opacity="0.05"/>
  
  <!-- Stacked Data Panels -->
  <g transform="translate(90, 40)">
    <!-- Bottom Panel -->
    <rect x="0" y="20" width="180" height="180" rx="12" fill="#c2410c" fill-opacity="0.2" />
    
    <!-- Middle Panel -->
    <rect x="10" y="10" width="180" height="180" rx="12" fill="#c2410c" fill-opacity="0.4" />
    
    <!-- Top Panel -->
    <rect x="20" y="0" width="180" height="180" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1" />
    
    <!-- Network Graph -->
    <g transform="translate(110, 90)">
      <!-- Connections -->
      <line x1="0" y1="0" x2="-40" y2="-40" stroke="#fdba74" stroke-width="2" />
      <line x1="0" y1="0" x2="40" y2="-40" stroke="#fdba74" stroke-width="2" />
      <line x1="0" y1="0" x2="-40" y2="40" stroke="#fdba74" stroke-width="2" />
      <line x1="0" y1="0" x2="40" y2="40" stroke="#fdba74" stroke-width="2" />
      
      <!-- Nodes -->
      <circle cx="0" cy="0" r="20" fill="url(#grad4)" />
      <circle cx="0" cy="0" r="28" fill="none" stroke="url(#grad4)" stroke-width="1.5" opacity="0.6" />
      
      <circle cx="-40" cy="-40" r="10" fill="#fed7aa" />
      <circle cx="40" cy="-40" r="10" fill="#fed7aa" />
      <circle cx="-40" cy="40" r="10" fill="#fed7aa" />
      <circle cx="40" cy="40" r="10" fill="#fed7aa" />
    </g>
  </g>
</svg>
