<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#f8fafc" fill-opacity="0.05"/>
  
  <!-- Stacked Financial Cards -->
  <g transform="translate(80, 50)">
    <!-- Bottom Card -->
    <rect x="0" y="20" width="200" height="160" rx="12" fill="#047857" fill-opacity="0.2" />
    
    <!-- Middle Card -->
    <rect x="10" y="10" width="200" height="160" rx="12" fill="#047857" fill-opacity="0.4" />
    
    <!-- Top Card (Chart) -->
    <rect x="20" y="0" width="200" height="160" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1" />
    
    <g transform="translate(20, 0)">
      <!-- Bars -->
      <rect x="30" y="80" width="20" height="50" rx="2" fill="url(#grad3)" opacity="0.6" />
      <rect x="60" y="50" width="20" height="80" rx="2" fill="url(#grad3)" opacity="0.8" />
      <rect x="90" y="20" width="20" height="110" rx="2" fill="url(#grad3)" />
      
      <!-- Graph Line -->
      <polyline points="30,70 60,40 90,10 120,30 150,10" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      
      <!-- Coin Icon -->
      <circle cx="160" cy="40" r="25" fill="none" stroke="url(#grad3)" stroke-width="4" stroke-dasharray="100" stroke-dashoffset="20" />
      <text x="153" y="47" font-family="sans-serif" font-size="16" fill="#10b981" font-weight="bold">$</text>
    </g>
  </g>
</svg>
