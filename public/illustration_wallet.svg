<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#f8fafc" fill-opacity="0.05"/>
  
  <!-- Stacked Wallet Cards -->
  <g transform="translate(90, 60)">
    <!-- Bottom Card -->
    <rect x="0" y="20" width="180" height="120" rx="12" fill="#be185d" fill-opacity="0.2" />
    
    <!-- Middle Card -->
    <rect x="10" y="10" width="180" height="120" rx="12" fill="#be185d" fill-opacity="0.4" />
    
    <!-- Top Wallet -->
    <g transform="translate(20, 0)">
      <rect x="0" y="0" width="180" height="120" rx="12" fill="url(#grad5)" />
      <path d="M0 30 Q 90 0 180 30" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="2" />
      
      <!-- Flap -->
      <path d="M130 0 L130 50 L180 50 L180 12 A 12 12 0 0 0 168 0 Z" fill="#9d174d" />
      <circle cx="155" cy="25" r="8" fill="#fbbf24" />
      
      <!-- Floating Coins -->
      <circle cx="155" cy="-15" r="12" fill="#fbbf24" stroke="#b45309" stroke-width="2" />
      <text x="150" y="-10" font-family="sans-serif" font-size="12" font-weight="bold" fill="#b45309">$</text>
      
      <circle cx="125" cy="-5" r="8" fill="#fbbf24" stroke="#b45309" stroke-width="1.5" />
      <circle cx="180" cy="0" r="6" fill="#fbbf24" stroke="#b45309" stroke-width="1.5" />
    </g>
  </g>
</svg>
